<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" fill="none">
  <!-- Melati (jasmine) floral divider -->
  <!-- Left line -->
  <line x1="0" y1="30" x2="100" y2="30" stroke="#C9A84C" stroke-width="1" />
  <!-- Right line -->
  <line x1="200" y1="30" x2="300" y2="30" stroke="#C9A84C" stroke-width="1" />
  <!-- Center flower -->
  <g transform="translate(150,30)">
    <!-- Petals -->
    <ellipse cx="0" cy="-12" rx="4" ry="8" fill="#F5EDD6" stroke="#C9A84C" stroke-width="0.8" />
    <ellipse cx="0" cy="-12" rx="4" ry="8" fill="#F5EDD6" stroke="#C9A84C" stroke-width="0.8" transform="rotate(45)" />
    <ellipse cx="0" cy="-12" rx="4" ry="8" fill="#F5EDD6" stroke="#C9A84C" stroke-width="0.8" transform="rotate(90)" />
    <ellipse cx="0" cy="-12" rx="4" ry="8" fill="#F5EDD6" stroke="#C9A84C" stroke-width="0.8" transform="rotate(135)" />
    <ellipse cx="0" cy="-12" rx="4" ry="8" fill="#F5EDD6" stroke="#C9A84C" stroke-width="0.8" transform="rotate(180)" />
    <ellipse cx="0" cy="-12" rx="4" ry="8" fill="#F5EDD6" stroke="#C9A84C" stroke-width="0.8" transform="rotate(225)" />
    <ellipse cx="0" cy="-12" rx="4" ry="8" fill="#F5EDD6" stroke="#C9A84C" stroke-width="0.8" transform="rotate(270)" />
    <ellipse cx="0" cy="-12" rx="4" ry="8" fill="#F5EDD6" stroke="#C9A84C" stroke-width="0.8" transform="rotate(315)" />
    <!-- Center -->
    <circle cx="0" cy="0" r="5" fill="#C9A84C" />
    <circle cx="0" cy="0" r="2.5" fill="#F5EDD6" />
  </g>
  <!-- Side buds -->
  <g transform="translate(120,30)">
    <ellipse cx="0" cy="-6" rx="3" ry="5" fill="#F5EDD6" stroke="#C9A84C" stroke-width="0.8" transform="rotate(30)" />
    <circle cx="0" cy="0" r="3" fill="#C9A84C" />
  </g>
  <g transform="translate(180,30)">
    <ellipse cx="0" cy="-6" rx="3" ry="5" fill="#F5EDD6" stroke="#C9A84C" stroke-width="0.8" transform="rotate(-30)" />
    <circle cx="0" cy="0" r="3" fill="#C9A84C" />
  </g>
</svg>
