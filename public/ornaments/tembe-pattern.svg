<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- Tembe Nggoli geometric pattern - diagonal weave motif -->
  <defs>
    <pattern id="tembe" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <!-- Diagonal lines -->
      <line x1="0" y1="0" x2="30" y2="30" stroke="#C9A84C" stroke-width="0.8" />
      <line x1="30" y1="0" x2="0" y2="30" stroke="#C9A84C" stroke-width="0.8" />
      <!-- Center diamond -->
      <rect x="12" y="12" width="6" height="6" transform="rotate(45 15 15)" fill="#C9A84C" />
      <!-- Corner dots -->
      <circle cx="0" cy="0" r="1.5" fill="#C9A84C" />
      <circle cx="30" cy="0" r="1.5" fill="#C9A84C" />
      <circle cx="0" cy="30" r="1.5" fill="#C9A84C" />
      <circle cx="30" cy="30" r="1.5" fill="#C9A84C" />
    </pattern>
  </defs>
  <rect width="120" height="120" fill="url(#tembe)" />
</svg>
